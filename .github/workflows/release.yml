name: Flutter Build

on:
  push:
    branches:
      - 'release*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Crear .env para el build
        run: |
          echo "POKEAPI_BASE_URL=https://pokeapi.co/api/v2" >> .env
          echo "SPRITE_BASE_URL=https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed . || true

      - name: Analyze project source
        run: flutter analyze || true

      - name: Run tests
        run: flutter test || true

      - name: Build APK
        run: flutter build apk --release

      - name: Get version and unique tag
        id: get_version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo "$RAW" | cut -d'+' -f1)
          BUILD=$(echo "$RAW" | cut -d'+' -f2)
          BASE_TAG="v${VERSION}+${BUILD}"

          echo "Buscando un tag disponible para ${BASE_TAG}..."

          COUNT=1
          while curl --silent \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/${BASE_TAG}-${COUNT}" \
            | grep -q '"ref"'; do
              COUNT=$((COUNT + 1))
          done

          FINAL_TAG="${BASE_TAG}-${COUNT}"
          echo "Tag disponible encontrado: ${FINAL_TAG}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tag=$FINAL_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.version }}+${{ steps.get_version.outputs.build }}
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
